name: Update Checker

env:
  # REPO_URL: https://github.com/coolsnowwolf/lede
  # REPO_BRANCH: master
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  # REPO_BRANCH: master
  REPO_BRANCH: openwrt-24.10
  # REPO_BRANCH: openwrt-25.12

on:
  workflow_dispatch:
  # schedule:
  #  - cron: 0 */18 * * *
  schedule:
    - cron: 0 */6 * * * 

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH .
        echo "commitHash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Compare Commit Hash
      id: cacheHash
      # uses: actions/cache@v3
      uses: actions/cache@v5
      with:
        path: .commitHash
        key: commitHash_${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      # uses: peter-evans/repository-dispatch@v2
      uses: peter-evans/repository-dispatch@v4
      with:
        # token: ${{ github.token }}
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: Source Code Update

    - name: Send Message to Wechat
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: HollowMan6/Wechat-Timed-Message@main
      with:
        TITLE: |
          ${{ github.repository }}
          工作流状态提醒
        CONTENT: |
          <b>发现源码更新，触发自动编译...</b>
          - 名称：${{ github.workflow }}
          - 仓库：${{ env.REPO_URL }}
          - 分支：${{ env.REPO_BRANCH }}
        IMAGE: https://raw.githubusercontent.com/xzhhzx222/Actions-OpenWrt/main/diy/openwrt.jpg
        CORPID: ${{ secrets.CORPID }}
        CORPSECRET: ${{ secrets.CORPSECRET }}
        AGENTID: ${{ secrets.AGENTID }}
    
    # - name: Delete workflow runs
    #   uses: Mattraks/delete-workflow-runs@v2
    #   with:
    #     retain_days: 0
    #     keep_minimum_runs: 2
