name: Test

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      # ssh:
      #   description: 'SSH connection to Actions'
      #   required: false
      #   default: 'false'
      branch:
        description: 'Openwrt Build Branch'
        required: true
        default: 'openwrt-22.03'
        type: choice
        options:
          - 'openwrt-22.03'
          - 'openwrt-23.05'
          # - 'lienol'
          - 'lede'
      version:
        description: 'Openwrt Build Version'
        required: true
        default: 'samwrt'
        type: choice
        options:
          - 'samwrt'
          - 'jimmywrt'

env:
  # REPO_URL: https://github.com/coolsnowwolf/lede
  # REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  # UPLOAD_COWTRANSFER: false
  # UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  BUILD_BRANCH: ${{github.event.inputs.branch}}

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Decide Branch and Version
      run: |
        if [ "$BUILD_BRANCH" == "openwrt-22.03" ] || [ "$BUILD_BRANCH" == "openwrt-23.05" ]; then
          echo "DEPENDS_UBUNTU=diy/depends/depends.openwrt" >> $GITHUB_ENV
          echo "REPO_URL=https://github.com/openwrt/openwrt" >> $GITHUB_ENV
          echo "REPO_BRANCH=${{github.event.inputs.branch}}" >> $GITHUB_ENV
          # echo "LOGO_FILE=openwrt/package/xzhhzx222/luci-app-wechatpush/root/usr/share/wechatpush/api/logo.jpg" >> $GITHUB_ENV
          # echo "SET_FILE=openwrt/package/default-settings/files/zzz-default-settings" >> $GITHUB_ENV
        elif [ $BUILD_BRANCH == lede ]; then
          echo "DEPENDS_UBUNTU=diy/depends/depends.lede" >> $GITHUB_ENV
          echo "REPO_URL=https://github.com/coolsnowwolf/lede" >> $GITHUB_ENV
          echo "REPO_BRANCH=master" >> $GITHUB_ENV
          # echo "LOGO_FILE=openwrt/package/xzhhzx222/luci-app-wechatpush/root/usr/share/serverchan/api/logo.jpg" >> $GITHUB_ENV
          # echo "SET_FILE=openwrt/package/lean/default-settings/files/zzz-default-settings" >> $GITHUB_ENV
        fi
        echo $BUILD_BRANCH
    
    - name: Echo
      env:
        CONFIG_FILE: $GITHUB_WORKSPACE/diy/configs/$BUILD_BRANCH.config
        DIY_SET: $GITHUB_WORKSPACE/diy/settings/$BUILD_BRANCH.settings
        DIY_LOGO: $GITHUB_WORKSPACE/diy/imgs/$BUILD_BRANCH.jpg
      run: |
        chmod +x ./diy.sh
        ./diy.sh
    
