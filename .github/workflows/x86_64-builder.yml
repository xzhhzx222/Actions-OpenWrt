name: x86_64 Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      branch:
        description: 'ImmortalWrt Branch'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - 'openwrt-24.10'
          - 'openwrt-25.12'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: ${{ github.event.client_payload.branch || github.event.inputs.branch}}
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Free Disk Space (Ubuntu)
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
    
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # sudo docker system prune --all --force --volumes
        sudo docker container prune --force
        sudo docker network prune --force
        sudo docker image prune --force
        sudo docker builder prune --all --force
        sudo docker volume prune --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat diy/ubuntu.depends)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
    
    - name: Create virtual disk for extended storage
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
        sudo mkdir -p /workdir
        sudo mount /dev/github/runner /workdir
        sudo chown -R runner:runner /workdir
        df -Th

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv -v files openwrt/files
        [ -e $CONFIG_FILE ] && mv -v $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt/
        echo -e "Compiling with $(nproc) threads"
        make -j$(($(nproc) + 1)) V=s || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        df -hT
        cd openwrt/bin/targets/*/*
        rm -rf packages
        sed -i 's/immortalwrt/openwrt/g' sha256sums
        for filename in immortalwrt-*; do
          mv -v "$filename" "openwrt-${filename#immortalwrt-}"
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
    
    - name: Upload bin directory
      uses: actions/upload-artifact@v7
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && !cancelled()
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Upload firmware directory
      uses: actions/upload-artifact@v7
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
        echo "release_name=$(date +"%y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "[Build Repo]: ${{ env.REPO_URL }}" >> release.txt
        echo "[Build Branch]: ${{ env.REPO_BRANCH }}" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v3
      if: steps.tag.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        name: ImmortalWrt_${{ steps.tag.outputs.release_name }}
        tag_name: ${{ env.FILE_DATE }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
        make_latest: true

    - name: Send Message to Wechat (Failure)
      uses: HollowMan6/Wechat-Timed-Message@main
      if: failure()
      with:
        TITLE: |
          ${{ github.repository }}
          工作流 ${{ github.workflow }} 流程失败
        CONTENT: |
          <b>工作流存在错误！！！</b>
          - 后台：<a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">点击查看详情</a>
        IMAGE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/diy/openwrt.jpg
        CORPID: ${{ secrets.CORPID }}
        CORPSECRET: ${{ secrets.CORPSECRET }}
        AGENTID: ${{ secrets.AGENTID }}
    
    - name: Send Message to Wechat (Success)
      uses: HollowMan6/Wechat-Timed-Message@main
      if: success()
      with:
        TITLE: |
          ${{ github.repository }}
          工作流 ${{ github.workflow }} 编译成功
        CONTENT: |
          <b>最新固件已发布！！！</b>
          - 名称：ImmortalWrt_${{ steps.tag.outputs.release_name }}
          - 分支：<a href="${{ env.REPO_URL }}/tree/${{ env.REPO_BRANCH }}">${{ env.REPO_BRANCH }}</a>
          - 标签：<a href="https://github.com/${{ github.repository }}/releases/tag/${{ env.FILE_DATE }}">${{ env.FILE_DATE }}</a>
          - 后台：<a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">点击查看详情</a>
        IMAGE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/diy/openwrt.jpg
        CORPID: ${{ secrets.CORPID }}
        CORPSECRET: ${{ secrets.CORPSECRET }}
        AGENTID: ${{ secrets.AGENTID }}
    
    - name: Delete releases and workflows runs
      uses: ophub/delete-releases-workflows@main
      with:
        delete_releases: true
        releases_keep_latest: 7
        delete_tags: true
        delete_workflows: true
        workflows_keep_day: 30
        gh_token: ${{ secrets.GITHUB_TOKEN }}
    
    
